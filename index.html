<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Xotira Karta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#f1f5f9;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card-wrap{perspective:1000px;width:320px;height:220px;margin:0 auto 20px}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.6s}
.card.flipped{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:20px;font-size:18px;text-align:center;box-shadow:0 8px 25px rgba(0,0,0,0.1)}
.front{background:white;color:#0f172a;border:2px solid #e2e8f0}
.back{background:#3b82f6;color:white;transform:rotateY(180deg)}
.controls{display:flex;gap:10px;justify-content:center}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:500;color:white;transition:0.2s}
.prev{background:#64748b}
.next{background:#10b981}
.flip{background:#f59e0b}
.progress{margin-top:15px;text-align:center;color:#64748b;font-size:14px}
.bar{height:6px;background:#e2e8f0;border-radius:3px;margin-top:5px;overflow:hidden}
.fill{height:100%;background:#10b981;transition:width 0.3s}
</style>
</head>
<body>
<div>
  <div class="card-wrap"><div class="card" id="card"><div class="front" id="front"></div><div class="back" id="back"></div></div></div>
  <div class="controls">
    <button class="prev" onclick="prev()">⬅️ Oldingi</button>
    <button class="flip" onclick="flip()">🔄 O'girish</button>
    <button class="next" onclick="next()">Keyingi ➡️</button>
  </div>
  <div class="progress"><span id="count">0/0</span><div class="bar"><div class="fill" id="fill" style="width:0%"></div></div></div>
</div>
<script>
const cards=[
  {q:"HTML nima?",a:"HyperText Markup Language - veb-sahifa tuzilmasi"},
  {q:"CSS nima?",a:"Cascading Style Sheets - dizayn va ko'rinish"},
  {q:"JS nima?",a:"JavaScript - interaktivlik va mantiq"},
  {q:"API nima?",a:"Application Programming Interface - dasturlar aloqasi"},
  {q:"Git nima?",a:"Versiyalarni boshqarish tizimi"}
];
let idx=0;
function update(){
  document.getElementById('front').textContent=cards[idx].q;
  document.getElementById('back').textContent=cards[idx].a;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('count').textContent=`${idx+1}/${cards.length}`;
  document.getElementById('fill').style.width=`${((idx+1)/cards.length)*100}%`;
}
function flip(){document.getElementById('card').classList.toggle('flipped')}
function next(){if(idx<cards.length-1){idx++;update()}}
function prev(){if(idx>0){idx--;update()}}
update();
</script>
</body>
</html>
